server {
    listen 80;
    listen [::]:80;

    server_name backend.example.com; # Replace true backend domain
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name backend.example.com; # Replace true backend domain

    ssl_certificate /etc/ca-certificates/backend.pem; # Replace backend ssl certificate
    ssl_certificate_key /etc/ca-certificates/backend.key; # Replace backend ssl certificate key

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'TLS_AES_128_GCM_SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml+rss application/xml image/svg+xml;

    client_max_body_size 1G;
    client_body_buffer_size 128k;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    location /stream {
        proxy_pass http://127.0.0.1:60001; # Replace backend port according frontend config toml
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 1200s;
        proxy_send_timeout 1200s;
        proxy_connect_timeout 120s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:60001; # Replace backend port according frontend config toml
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 1200s;
        proxy_send_timeout 1200s;
    }

    # WebDav accel_redirect internal origin routes.
    # EmbyStream returns:
    #   X-Accel-Redirect: /_origin/webdav/<node_uuid>/<file_path>
    #
    # <file_path> is the file path, preserving path hierarchy, with normal
    # URL-escaped path segments. Map each node_uuid to its own WebDav upstream.
    location ^~ /_origin/webdav/webdav_node_a/ {
        internal;
        rewrite ^/_origin/webdav/webdav_node_a/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:60005;

        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:60005;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
        send_timeout 3600s;

        tcp_nopush on;
        tcp_nodelay on;
    }
}
