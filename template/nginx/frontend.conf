# EmbyStream Frontend Nginx Configuration
#
# EmbyStream acts as the full reverse proxy for Emby, handling:
#   - Video stream interception (ForwardMiddleware)
#   - Playlist mock responses (PlaylistMockMiddleware)
#   - API response caching for slow endpoints (ReverseProxyMiddleware)
#   - All other requests proxied to Emby (ReverseProxyMiddleware)
#
# Nginx only needs to handle HTTPS termination and WebSocket proxying.

server {
    listen 80;
    listen [::]:80;

    server_name frontend.example.com; # Replace frontend domain
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2  on;

    server_name frontend.example.com; # Replace frontend domain

    ssl_session_timeout 30m;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_certificate /etc/ca-certificates/frontend.pem; # Replace frontend ssl certificate
    ssl_certificate_key /etc/ca-certificates/frontend.key; # Replace frontend ssl certificate key
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 100M;

    add_header 'Referrer-Policy' 'origin-when-cross-origin';
    add_header Strict-Transport-Security "max-age=15552000; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location ~* \.(webp|jpg|jpeg|png|gif|ico|css|js|html)$|Images|fonts {
        proxy_pass http://127.0.0.1:60001;
        proxy_set_header Host $host;
        proxy_set_header Connection "upgrade";
        expires 10y;
        add_header Pragma "public";
        add_header Cache-Control "public";
    }

    location ~* /(socket|embywebsocket) {
        proxy_pass http://127.0.0.1:8096; # Replace port if needed
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Protocol $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_cache off;
    }

    # All other requests go through EmbyStream
    location / {
        proxy_pass http://127.0.0.1:60001; # Replace frontend port according frontend config toml
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_hide_header X-Powered-By;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        proxy_buffering off;
    }

    # WebDav accel_redirect internal origin routes.
    # EmbyStream returns:
    #   X-Accel-Redirect: /_origin/webdav/<node_uuid>/<file_path>
    #
    # <file_path> is the file path, preserving path hierarchy, with normal
    # URL-escaped path segments. Map each node_uuid to its own WebDav upstream.
    location ^~ /_origin/webdav/webdav_node_a/ {
        internal;
        rewrite ^/_origin/webdav/webdav_node_a/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:60005;

        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:60005;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
        send_timeout 3600s;

        tcp_nopush on;
        tcp_nodelay on;
    }

    # googleDrive accel_redirect internal origin routes.
    # EmbyStream returns:
    #   X-Accel-Redirect:
    #   /_origin/google-drive/<node_uuid>/<file_id>?token=Bearer%20...
    #
    # Map each node_uuid to its Google Drive media upstream and copy the
    # internal authorization query parameter back into the upstream header.
    location ~ ^/_origin/google-drive/google_drive_node_a/([^/]+)$ {
        internal;
        set $google_file_id $1;
        set $google_drive_query "alt=media&supportsAllDrives=true&acknowledgeAbuse=true";
        proxy_pass https://www.googleapis.com/drive/v3/files/$google_file_id?$google_drive_query;

        proxy_http_version 1.1;
        proxy_set_header Authorization $arg_token;
        proxy_set_header Host www.googleapis.com;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_ssl_server_name on;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
        send_timeout 3600s;
    }
}
