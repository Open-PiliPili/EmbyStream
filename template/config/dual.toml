[Log]
level = "info"
prefix = ""
root_path = "/var/logs/embystream"

[General]
memory_mode = "middle"
stream_mode = "dual"
encipher_key = "Q4eCbawEp3sCvDvx"
encipher_iv = "a3cH2abhxnu9hGo5"

[Emby]
url = "http://127.0.0.1"
port = "8096"
token = "nmbp7mpixze8ghdfgki6yrijkeq5zuao"

[UserAgent]
mode = "deny"
allow_ua = []
deny_ua = ["curl", "wget", "python", "fimily", "infuse-library"]

[Http2]
ssl_cert_file = ""
ssl_key_file = ""

[Fallback]
video_missing_path = "/mnt/anime/fallback/video_missing.mp4"

[Frontend]
listen_port = 60001

[[Frontend.PathRewrite]]
enable = false
pattern = "^(/.*)$"
replacement = "https://my-cdn.com$1"

[Frontend.AntiReverseProxy]
enable = false
host = ""

[Backend]
listen_port = 3000
base_url = "http://127.0.0.1"
port = "3000"
path = ""
problematic_clients = ["yamby", "hills", "embytolocalplayer", "Emby/"]

[[BackendNode]]
name = "LocalDisk"
type = "Disk"
pattern = "/mnt/media/.*"
base_url = "http://127.0.0.1"
port = "3000"
path = "/mnt/media"
priority = 0
proxy_mode = "proxy"
client_speed_limit_kbs = 0
client_burst_speed_kbs = 0

[[BackendNode.PathRewrite]]
enable = false
pattern = "^/mnt/media(/.*)$"
replacement = "/media$1"

[[BackendNode.PathRewrite]]
enable = false
pattern = "^(.*)\\.mkv$"
replacement = "$1.mp4"

[BackendNode.Disk]

[[BackendNode]]
name = "MyOpenList"
type = "OpenList"
pattern = "/openlist/.*"
base_url = "http://alist.example.com"
port = "5244"
path = "/openlist"
priority = 0
proxy_mode = "redirect"
client_speed_limit_kbs = 0
client_burst_speed_kbs = 0

[[BackendNode.PathRewrite]]
enable = false
pattern = "^/openlist(/.*)$"
replacement = "$1"

[BackendNode.AntiReverseProxy]
enable = false
host = ""

[BackendNode.OpenList]
base_url = "http://alist.example.com"
token = "mock_token_12345"

[[BackendNode]]
name = "CloudDrive"
type = "DirectLink"
pattern = "/cloud/.*"
base_url = "https://cloud.example.com"
port = "443"
path = "/cloud"
priority = 0
proxy_mode = "redirect"
client_speed_limit_kbs = 0
client_burst_speed_kbs = 0

[[BackendNode.PathRewrite]]
enable = false
pattern = "^/cloud(/.*)$"
replacement = "https://cdn.example.com$1"

[BackendNode.AntiReverseProxy]
enable = false
host = ""

[BackendNode.DirectLink]
user_agent = "Mozilla/5.0 (MockClient)"

[[BackendNode]]
name = "RcloneWebDav"
type = "WebDav"
pattern = "/rclone/.*"
base_url = "http://127.0.0.1"
port = "60005"
path = ""
priority = 0
proxy_mode = "accel_redirect"
client_speed_limit_kbs = 0
client_burst_speed_kbs = 0

[[BackendNode.PathRewrite]]
enable = false
pattern = "^/rclone(/.*)$"
replacement = "$1"

[BackendNode.AntiReverseProxy]
enable = false
host = ""

[BackendNode.WebDav]
node_uuid = "webdav_node_a"
url_mode = "path_join"
query_param = "path"
url_template = ""
username = ""
password = ""
user_agent = ""

[[BackendNode]]
name = "GoogleDriveMedia"
type = "googleDrive"
pattern = "/gdrive/.*"
base_url = "https://www.googleapis.com"
port = "443"
path = ""
priority = 0
proxy_mode = "accel_redirect"
client_speed_limit_kbs = 0
client_burst_speed_kbs = 0
# This dual-mode template uses `accel_redirect` as the production-oriented
# example when Nginx internal origin routing is enabled.

[[BackendNode.PathRewrite]]
enable = false
pattern = "^/gdrive(/.*)$"
replacement = "$1"

[BackendNode.AntiReverseProxy]
enable = false
host = ""

[BackendNode.GoogleDrive]
node_uuid = "google_drive_node_a"
client_id = "replace_with_google_client_id"
client_secret = "replace_with_google_client_secret"
drive_id = ""
drive_name = "SharedMedia"
access_token = "replace_with_google_access_token"
refresh_token = "replace_with_google_refresh_token"
# `refresh_token` is the durable credential. `access_token` is only a cache
# snapshot and may be rotated by EmbyStream. Runtime may also write back a
# preferred `token = { access_token = ..., refresh_token = ..., token_type = ...,
# expiry = ... }` blob later.
